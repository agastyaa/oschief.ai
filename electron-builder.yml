appId: com.oschief.app
productName: OSChief
publish:
  provider: github
  owner: agastyaa
  repo: oschief.ai
  releaseType: release
directories:
  buildResources: electron/resources
  output: dist
files:
  - out/**/*
  - package.json
  - "!**/{.DS_Store,.git,.gitignore}"
  - "!**/node_modules/**/{README,CHANGELOG,readme,changelog,HISTORY}*"
  - "!**/node_modules/**/{test,__tests__,tests,example,examples,docs,.github}/**"
  - "!**/node_modules/**/*.{md,ts,map}"
  - "!**/node_modules/.bin"
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/onnxruntime-node/**"
  - "node_modules/node-llama-cpp/**"
mac:
  category: public.app-category.productivity
  notarize: false
  extendInfo:
    NSSpeechRecognitionUsageDescription: "Syag uses speech recognition to transcribe your meetings when you choose Apple Speech. Audio is processed on your device or by Apple's service."
  extraResources:
    - from: electron/resources/darwin
      to: darwin
      filter:
        - "**/*"
        - "!**/parakeet-coreml/.build/**"
    - from: resources/lenny-transcripts.db
      to: lenny-transcripts.db
        - "!**/parakeet-coreml/Sources/**"
        - "!**/parakeet-coreml/Package.swift"
        - "!**/parakeet-coreml/Package.resolved"
        - "!**/syag-mlx-llm/**"
    - from: electron/resources/tray-icon-template-2x.png
      to: tray-icon-template-2x.png
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  icon: electron/resources/icon.icns
  identity: "Sagar Adrushappa Kalarkopp (4TF93K384V)"
  hardenedRuntime: true
  entitlements: electron/resources/entitlements.mac.plist
  entitlementsInherit: electron/resources/entitlements.mac.inherit.plist
  gatekeeperAssess: false
dmg:
  artifactName: "${productName}-${version}-${arch}.dmg"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
npmRebuild: true
