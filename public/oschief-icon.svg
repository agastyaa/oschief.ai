<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#2A2A2E"/>
      <stop offset="100%" stop-color="#1A1A1E"/>
    </linearGradient>
  </defs>

  <!-- macOS rounded-rect background — dark charcoal -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Subtle top highlight for depth -->
  <rect x="32" y="32" width="960" height="480" rx="220" ry="220" fill="white" opacity="0.03"/>

  <!-- Central large node -->
  <circle cx="512" cy="512" r="80" fill="white"/>

  <!-- Cardinal satellite nodes (medium) -->
  <circle cx="512" cy="310" r="22" fill="white"/>   <!-- top -->
  <circle cx="714" cy="512" r="22" fill="white"/>   <!-- right -->
  <circle cx="512" cy="714" r="22" fill="white"/>   <!-- bottom -->
  <circle cx="310" cy="512" r="22" fill="white"/>   <!-- left -->

  <!-- Diagonal satellite nodes (small) -->
  <circle cx="370" cy="370" r="12" fill="white"/>   <!-- top-left -->
  <circle cx="654" cy="370" r="12" fill="white"/>   <!-- top-right -->
  <circle cx="654" cy="654" r="12" fill="white"/>   <!-- bottom-right -->
  <circle cx="370" cy="654" r="12" fill="white"/>   <!-- bottom-left -->

  <!-- Tiny accent dots (between cardinal and diagonal) -->
  <circle cx="432" cy="326" r="6" fill="white" opacity="0.6"/>   <!-- between top and top-left -->
  <circle cx="592" cy="326" r="6" fill="white" opacity="0.6"/>   <!-- between top and top-right -->
  <circle cx="698" cy="432" r="6" fill="white" opacity="0.6"/>   <!-- between right and top-right -->
  <circle cx="698" cy="592" r="6" fill="white" opacity="0.6"/>   <!-- between right and bottom-right -->
  <circle cx="592" cy="698" r="6" fill="white" opacity="0.6"/>   <!-- between bottom and bottom-right -->
  <circle cx="432" cy="698" r="6" fill="white" opacity="0.6"/>   <!-- between bottom and bottom-left -->
  <circle cx="326" cy="592" r="6" fill="white" opacity="0.6"/>   <!-- between left and bottom-left -->
  <circle cx="326" cy="432" r="6" fill="white" opacity="0.6"/>   <!-- between left and top-left -->
</svg>
